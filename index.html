<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Untukmu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  width:100%; height:100%;
  overflow:hidden;
  background:#04080f;
  font-family:'Jost', sans-serif;
  color:#fff;
}

/* background gelap sama persis seperti halaman bunga */
#bg{
  position:fixed; inset:0; z-index:0;
}
#bg-canvas{
  position:fixed; inset:0; z-index:0;
  width:100%; height:100%;
}

/* scene tengah */
.scene{
  position:fixed; inset:0; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px;
  gap:0;
}

/* setiap baris teks */
.line{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:300;
  font-size: clamp(17px, 4.2vw, 24px);
  color:rgba(255,245,248,0.92);
  line-height:1.9;
  text-align:center;
  opacity:0;
  transform:translateY(18px);
  transition: opacity 0.9s ease, transform 0.9s ease;
  text-shadow: 0 2px 20px rgba(232,96,138,0.30);
}
.line.show{
  opacity:1;
  transform:translateY(0);
}

/* baris pertama lebih besar */
.line.big{
  font-size: clamp(22px, 5.5vw, 32px);
  color:#ffb6d4;
  margin-bottom:8px;
  text-shadow: 0 2px 30px rgba(232,96,138,0.50);
}

/* spasi antar baris */
.gap{ height:10px; }
.gap-lg{ height:28px; }

/* tombol — muncul terakhir */
.btn-wrap{
  margin-top:40px;
  opacity:0;
  transform:translateY(18px);
  transition: opacity 1.0s ease, transform 1.0s ease;
}
.btn-wrap.show{
  opacity:1;
  transform:translateY(0);
}

.btn{
  display:inline-flex; align-items:center; gap:10px;
  padding:13px 36px;
  background:linear-gradient(135deg,rgba(212,68,110,0.85),rgba(232,96,138,0.85));
  color:#fff;
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:11px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  border:none; cursor:pointer; border-radius:1px;
  backdrop-filter:blur(8px);
  box-shadow: 0 6px 28px rgba(212,68,110,0.35), 0 0 0 1px rgba(255,180,200,0.15);
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  position:relative; overflow:hidden;
}
.btn::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
  opacity:0; transition:opacity 0.3s;
}
.btn:hover{ transform:translateY(-2px); box-shadow:0 10px 36px rgba(212,68,110,0.50); }
.btn:hover::before{ opacity:1; }
.btn:active{ transform:translateY(0); }
.btn-icon{ font-size:14px; transition:transform 0.3s; }
.btn:hover .btn-icon{ transform:translateX(4px); }

/* overlay transisi */
.overlay{
  position:fixed; inset:0; z-index:999;
  background:#04080f;
  opacity:0; pointer-events:none;
  transition:opacity 0.9s ease;
}
.overlay.active{ opacity:1; pointer-events:all; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="overlay" id="overlay"></div>

<div class="scene" id="scene">
  <!-- teks dimunculkan oleh JS satu per satu -->
</div>

<script>
/* ── BACKGROUND BINTANG (sama persis dengan halaman bunga) ── */
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let BW, BH;

function resizeBg(){
  BW = bgCanvas.width  = window.innerWidth;
  BH = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const STARS = Array.from({length:130},()=>({
  x:Math.random(), y:Math.random()*0.92,
  r:0.3+Math.random()*1.3,
  a:0.3+Math.random()*0.7,
  spd:0.004+Math.random()*0.012,
  phase:Math.random()*Math.PI*2
}));

const GLITTERS = Array.from({length:35},()=>({
  x:Math.random(), y:Math.random(),
  phase:Math.random()*Math.PI*2,
  spd:0.014+Math.random()*0.022,
  r:0.5+Math.random()*1.4,
  col:['#fffbe0','#ffd6ec','#e8e8ff'][Math.floor(Math.random()*3)]
}));

function drawBg(){
  bgCtx.clearRect(0,0,BW,BH);

  // background radial gelap
  const grad=bgCtx.createRadialGradient(BW*0.5,BH*0.28,0,BW*0.5,BH*0.55,Math.max(BW,BH));
  grad.addColorStop(0,'#0d1828');
  grad.addColorStop(0.5,'#060c15');
  grad.addColorStop(1,'#020408');
  bgCtx.fillStyle=grad;
  bgCtx.fillRect(0,0,BW,BH);

  // bintang
  STARS.forEach(s=>{
    s.phase+=s.spd;
    bgCtx.globalAlpha=s.a*(0.4+0.6*Math.abs(Math.sin(s.phase)));
    bgCtx.fillStyle='#ffffff';
    bgCtx.beginPath();
    bgCtx.arc(s.x*BW,s.y*BH,s.r,0,Math.PI*2);
    bgCtx.fill();
  });

  // glitter
  GLITTERS.forEach(g=>{
    g.phase+=g.spd;
    bgCtx.globalAlpha=0.15+0.55*Math.abs(Math.sin(g.phase));
    bgCtx.fillStyle=g.col;
    bgCtx.shadowColor=g.col; bgCtx.shadowBlur=5;
    bgCtx.beginPath();
    bgCtx.arc(g.x*BW,g.y*BH,g.r,0,Math.PI*2);
    bgCtx.fill();
    bgCtx.shadowBlur=0;
  });

  bgCtx.globalAlpha=1;
  requestAnimationFrame(drawBg);
}
drawBg();

/* ── KATA-KATA ── */
// setiap item: { text, class, delay (ms setelah item sebelumnya) }
const LINES = [
  { text:'hehe Halo Bu,',          cls:'line big',  pause:0    },
  { text:'selamat ulang tahun yee!', cls:'line big', pause:400  },
  { text:'gap-lg' },
  { text:'Akhirnya ak nemu sesuatu',  cls:'line',    pause:700  },
  { text:'yang nggak bisa Ibu tolak nih hehe.',  cls:'line', pause:300 },
  { text:'gap' },
  { text:'Soalnya kalau aku kasih yang lain',  cls:'line',    pause:500  },
  { text:'km selalu nolak terus,',            cls:'line',    pause:300  },
  { text:'jadinya kurang seru jier.',         cls:'line',    pause:300  },
  { text:'gap' },
  { text:'Walaupun ini bukan kado nyata,',    cls:'line',    pause:600  },
  { text:'semoga km tetap suka ye!',          cls:'line',    pause:300  },
];

const scene = document.getElementById('scene');
let totalDelay = 800; // delay awal

LINES.forEach(item=>{
  if(item.text==='gap' || item.text==='gap-lg'){
    const gap = document.createElement('div');
    gap.className = item.text;
    scene.appendChild(gap);
    return;
  }
  const el = document.createElement('div');
  el.className = item.cls;
  el.textContent = item.text;
  scene.appendChild(el);

  totalDelay += item.pause;
  const d = totalDelay;
  setTimeout(()=>{ el.classList.add('show'); }, d);
  totalDelay += 900; // durasi tiap baris
});

// tombol muncul setelah semua teks
const btnWrap = document.createElement('div');
btnWrap.className = 'btn-wrap';
btnWrap.innerHTML = `
  <button class="btn" onclick="openFlowers()">
    <span>Lihat Hadiahnya</span>
    <span class="btn-icon">✿</span>
  </button>`;
scene.appendChild(btnWrap);

setTimeout(()=>{ btnWrap.classList.add('show'); }, totalDelay + 600);

/* ── PINDAH KE HALAMAN BUNGA ── */
function openFlowers(){
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  setTimeout(()=>{
    window.location.href = 'bunga-lily-final.html';
  }, 900);
}
</script>
</body>
</html>
